<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBattles 2-6 Players - Mini Clash</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #007acc;
        }
        p {
            color: #aaaaaa;
            margin: 0;
        }
        .game-container {
            background-color: #2a2a2a;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        #instruction {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #ffffff;
        }
        .arena {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }
        .player-box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            width: 48%;
            border: 2px solid #444;
        }
        .player-box h2 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        .key-prompt {
            background: #333;
            color: #007acc;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        .progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.1s ease-out;
        }
        #p1-bar { background-color: #ff4d4d; }
        #p2-bar { background-color: #3399ff; }

        .btn-container {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .action-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .action-btn:hover {
            background-color: #005999;
        }
        .back-btn {
            background-color: #444;
            color: #ccc;
        }
        .back-btn:hover {
            background-color: #555;
        }
        #winner {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffaa;
            margin-top: 20px;
            min-height: 36px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MiniBattles - Micro Clash</h1>
        <p>A fast-paced two player button basher!</p>
    </div>

    <div class="game-container">
        <div id="instruction">Press your key as fast as possible to fill the meter!</div>

        <div class="arena">
            <div class="player-box">
                <h2>Player 1</h2>
                <div class="key-prompt">Key: A</div>
                <div class="progress-bar-container">
                    <div id="p1-bar" class="progress-bar"></div>
                </div>
            </div>
            
            <div class="player-box">
                <h2>Player 2</h2>
                <div class="key-prompt">Key: L</div>
                <div class="progress-bar-container">
                    <div id="p2-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>

        <div id="winner"></div>

        <div class="btn-container">
            <button class="action-btn" id="start-btn" onclick="startGame()">Start Game</button>
            <a href="../index.html" class="action-btn back-btn">Back to Arcade</a>
        </div>
    </div>

    <script>
        let p1Score = 0;
        let p2Score = 0;
        let gameActive = false;

        const p1Bar = document.getElementById('p1-bar');
        const p2Bar = document.getElementById('p2-bar');
        const winnerText = document.getElementById('winner');
        const startBtn = document.getElementById('start-btn');

        function startGame() {
            p1Score = 0;
            p2Score = 0;
            gameActive = true;
            winnerText.innerText = "";
            p1Bar.style.width = '0%';
            p2Bar.style.width = '0%';
            startBtn.innerText = "Restart Game";
            document.addEventListener('keydown', handleKeyPress);
        }

        function handleKeyPress(e) {
            if (!gameActive) return;

            const key = e.key.toLowerCase();
            
            if (key === 'a') {
                p1Score += 4;
                if (p1Score > 100) p1Score = 100;
                p1Bar.style.width = p1Score + '%';
                checkWin();
            } else if (key === 'l') {
                p2Score += 4;
                if (p2Score > 100) p2Score = 100;
                p2Bar.style.width = p2Score + '%';
                checkWin();
            }
        }

        function checkWin() {
            if (p1Score >= 100) {
                gameActive = false;
                winnerText.innerText = "🎉 Player 1 Wins!";
                document.removeEventListener('keydown', handleKeyPress);
            } else if (p2Score >= 100) {
                gameActive = false;
                winnerText.innerText = "🎉 Player 2 Wins!";
                document.removeEventListener('keydown', handleKeyPress);
            }
        }
    </script>

</body>
</html>
