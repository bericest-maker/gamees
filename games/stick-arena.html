<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Arena: Battle</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        /* Container keeping the game and leaving room for the bottom button */
        .game-container {
            width: 100%;
            height: 90%; 
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Bottom button area below the game */
        .bottom-area {
            height: 10%;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #333;
        }

        .bottom-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .bottom-btn:hover {
            background-color: #005999;
        }

        /* Transparent Exit Fullscreen Button (Hidden by default) */
        #exit-fs-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            backdrop-filter: blur(4px);
            transition: background 0.2s, opacity 0.2s;
            display: none;
        }

        #exit-fs-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* Fullscreen state styling */
        body.is-fullscreen .bottom-area {
            display: none;
        }

        body.is-fullscreen .game-container {
            height: 100%;
        }

        body.is-fullscreen #exit-fs-btn {
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <iframe 
            title="Stick Arena: Battle" 
            name="game-frame" 
            id="game-frame" 
            src="https://www.twoplayergames.org/gameframe/stick-arena-battle" 
            tabindex="-1" 
            allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share" 
            scrolling="no" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="bottom-area">
        <button id="fullscreen-btn" class="bottom-btn">Enter Fullscreen</button>
    </div>

    <button id="exit-fs-btn">Exit Fullscreen</button>

    <script>
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const exitFsBtn = document.getElementById('exit-fs-btn');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error("Error enabling full screen:", err.message);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        exitFsBtn.addEventListener('click', toggleFullscreen);

        // Adjust UI elements when entering/exiting fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('is-fullscreen');
            } else {
                document.body.classList.remove('is-fullscreen');
            }
        });
    </script>

</body>
</html>
