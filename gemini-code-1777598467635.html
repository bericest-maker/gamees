<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Arcade Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 My Game Library</h1>
        <input type="text" id="searchBar" placeholder="Search for games..." onkeyup="filterGames()">
    </header>

    <main class="game-grid" id="gameGrid">
        <div class="game-card" onclick="openGame('games/game1.html')">
            <img src="https://via.placeholder.com/150" alt="Game 1 Thumbnail">
            <h3>Super Adventure</h3>
            <p>Action / Platformer</p>
        </div>

        <div class="game-card" onclick="openGame('games/game2.html')">
            <img src="https://via.placeholder.com/150" alt="Game 2 Thumbnail">
            <h3>Puzzle Master</h3>
            <p>Brain / Puzzle</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
